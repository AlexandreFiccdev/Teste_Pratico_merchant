services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: merchants_api
    ports:
      - "8000:8000"
    environment:
      - DJANGO_DB_PATH=/app/data/db.sqlite3
    volumes:
      - api_db_data:/app/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: merchants_frontend
    ports:
      - "8080:8080"
    environment:
      - API_BASE_URL=http://api:8000/api
    volumes:
      - ./frontend:/app
    depends_on:
      - api

volumes:
  api_db_data:
